{% extends "base.html" %}
{% block content %}
{% include "_nav.html" %}
<h1>Zamestnanci</h1>
<form method="POST" class="row g-3 mb-4 p-3 bg-light rounded">
  <div class="col-md-3">
    <input name="name" placeholder="Meno" class="form-control" required>
  </div>
  <div class="col-md-3">
    <input name="surname" placeholder="Priezvisko" class="form-control" required>
  </div>

  <div class="col-md-3">
    <button type="submit" class="btn btn-primary">Pridaj zamestnanca</button>
  </div>
</form>

<h2>Zoznam zamestnancov</h2>
<table class="table table-bordered table-striped">
  <thead class="table-dark">
    <tr>
      <th>Meno</th>
      <th>Priezvisko</th>
      <th>modify</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {% for emp in all_emps %}
    <tr>
      <td>{{ emp.name }}</td>
      <td>{{ emp.surname }}</td>
  
      <td>
        <a href="/edit_employee/{{ emp.id }}" class="btn btn-sm btn-warning">Edit</a>
        <a href="/report/{{ emp.id }}" class="btn btn-sm btn-info">Report</a>
        <a href="/delete_employee/{{ emp.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Naozaj chcete odstrániť tohto zamestnanca a všetky jeho záznamy?')">Delete</a>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>

<hr class="my-4">
<h5>Odoslať mesačný report emailom</h5>
<form method="POST" action="/send_report" class="row g-3 align-items-end p-3 bg-light rounded">
  <div class="col-md-3">
    <label class="form-label">Mesiac:</label>
    <input type="month" name="month" class="form-control"
           value="{{ current_month }}" required>
  </div>
  <div class="col-md-3">
    <button type="submit" class="btn btn-outline-primary"
            onclick="return confirm('Odoslať report emailom?')">
      Odoslať report
    </button>
  </div>
</form>

{% endblock %}
